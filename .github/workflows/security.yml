name: Security Audit

on:
  push:
    branches:
      - main

jobs:
  audit:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: P2/Conteudos/Atividades/Atividade 7

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm audit